<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus objetivos do ano</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="conteudo-principal">
        <h2 class="titulo-principal">Meus Objetivos do ano<span>_</span></h2>
        <div class="conteudo">
        <div class="botoes">
              <button class="botao ativo">Simulado UFPR</button>
            <button class="botao">Livros UFPR</button>
            <button class="botao">Aniversário pai</button>
            <button class="botao">Aniversário Brayan</button>
        </div>
        <div class="abas-textos">
            <div class="aba-conteudo ativo">
                <h3 class="aba-conteudo-titulo-principal">Realizar o simulado oficial da UFPR</h3>
                <h4 class="aba-conteudo-titulo-secundario">Prazo restante</h4>
                <div class="contador">
                <div class="contador-digito">
                    <p class="contador-digito-numero">7</p>
                    <p class="contador-digito-texto">dias</p>
                </div>
                <div class="contador-digito">
                    <p class="contador-digito-numero">7</p>
                    <p class="contador-digito-texto">horas</p>
                </div>
                <div class="contador-digito">
                    <p class="contador-digito-numero">7</p>
                    <p class="contador-digito-texto">min</p>
                </div>
               <div class="contador-digito">
                    <p class="contador-digito-numero">7</p>
                    <p class="contador-digito-texto">seg</p>
                </div>
               </div>
            </div>
            <div class="aba-conteudo">
                <h3 class="aba-conteudo-titulo-principal">Ler o restante dos livros da UFPR</h3>
                <h4 class="aba-conteudo-titulo-secundario">Prazo restante</h4>
                <div class="contador"></div>
            </div>
            <div class="aba-conteudo">
                <h3 class="aba-conteudo-titulo-principal">Data de aniversário do meu pai</h3>
                <h4 class="aba-conteudo-titulo-secundario">Prazo restante</h4>
                <div class="contador"></div>
            </div>
            <div class="aba-conteudo">
                <h3 class="aba-conteudo-titulo-principal">Data de aniversário do Babs</h3>
                <h4 class="aba-conteudo-titulo-secundario">Prazo restante</h4>
                <div class="contador"></div>
            </div>
        </div>
    </div>
    </section>
    <script src="main.js"></script>
</body>

</html>
